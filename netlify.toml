[build]
  command = "bun install && bun run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback so client-side routes resolve to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
